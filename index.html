<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Victor Automobiles — Invoice Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #666660; --text3: #999993;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de; --success-text: #3b6d11;
    --warning-bg: #faeeda; --warning-text: #854f0b;
    --danger-bg: #fcebeb; --danger-text: #a32d2d;
    --radius: 10px; --radius-lg: 14px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #282825; --bg3: #323230;
      --text: #f0efeb; --text2: #a8a89f; --text3: #6e6e68;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success-bg: #173404; --success-text: #c0dd97;
      --warning-bg: #412402; --warning-text: #fac775;
      --danger-bg: #501313; --danger-text: #f09595;
    }
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1rem; position: sticky; top: 0; z-index: 50; }
  .header-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; }
  .nav { display: flex; gap: 4px; }
  .nav-btn { padding: 7px 16px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: var(--text2); font-family: var(--font); transition: all 0.15s; }
  .nav-btn.active { background: var(--text); color: var(--bg); }
  .nav-btn:hover:not(.active) { background: var(--bg2); color: var(--text); }
  .container { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .view { display: none; }
  .view.active { display: block; }
  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; letter-spacing: -0.3px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.6px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .grid3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 360px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
  input, select, textarea {
    width: 100%; font-family: var(--font); font-size: 15px;
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    outline: none; transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--border2); background: var(--bg); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button { display: none; }
  input[type=date] { cursor: pointer; }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  .items-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 400px; }
  th { text-align: left; padding: 6px 8px; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text3); border-bottom: 0.5px solid var(--border); }
  td { padding: 5px 4px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .td-input { background: transparent; border: none; border-radius: 6px; padding: 6px 8px; font-size: 14px; color: var(--text); font-family: var(--font); width: 100%; }
  .td-input:focus { background: var(--bg2); outline: none; }
  .td-input[type=number] { -moz-appearance: textfield; }
  .td-input[type=number]::-webkit-inner-spin-button { display: none; }
  .amt-cell { font-size: 14px; font-weight: 500; padding-left: 8px; white-space: nowrap; }
  .btn { padding: 9px 18px; border-radius: 8px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 14px; font-family: var(--font); color: var(--text); transition: all 0.15s; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: var(--danger-text); border-color: transparent; background: var(--danger-bg); }
  .btn.danger:hover { opacity: 0.8; }
  .btn.pdf-btn { color: #185fa5; border-color: transparent; background: #e6f1fb; font-size: 12px; padding: 5px 11px; }
  .btn.pdf-btn:hover { opacity: 0.8; }
  .btn.sm { padding: 5px 11px; font-size: 12px; }
  .btn.xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }
  .totals-box { background: var(--bg2); border-radius: 10px; padding: 14px; }
  .total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: var(--text2); }
  .total-row.grand { font-size: 18px; font-weight: 600; color: var(--text); border-top: 0.5px solid var(--border); margin-top: 6px; padding-top: 10px; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-success { background: var(--success-bg); color: var(--success-text); }
  .badge-warning { background: var(--warning-bg); color: var(--warning-text); }
  .badge-danger { background: var(--danger-bg); color: var(--danger-text); }
  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 12px; }
  .acct-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .acct-name { font-size: 16px; font-weight: 600; }
  .acct-phone { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: 8px; padding: 10px 12px; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .stat-val { font-size: 17px; font-weight: 600; }
  .stat-val.danger { color: var(--danger-text); }
  .stat-val.success { color: var(--success-text); }
  .pay-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
  .pay-row input { flex: 1; min-width: 120px; max-width: 180px; }
  .inv-detail { display: none; border-top: 0.5px solid var(--border); margin-top: 14px; padding-top: 12px; }
  .inv-detail.open { display: block; }
  .inv-block { border: 0.5px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; background: var(--bg2); }
  .inv-block:last-child { margin-bottom: 0; }
  .inv-block-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .inv-num { font-weight: 700; font-size: 13px; }
  .inv-date-txt { font-size: 12px; color: var(--text2); }
  .inv-status-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
  .inv-items-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; background: var(--bg); border-radius: 7px; overflow: hidden; }
  .inv-items-table th { padding: 6px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); font-weight: 600; border-bottom: 0.5px solid var(--border); text-align: left; }
  .inv-items-table td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); }
  .inv-items-table tr:last-child td { border-bottom: none; }
  .inv-items-table .td-right { text-align: right; font-weight: 500; }
  .inv-totals { font-size: 12px; padding-top: 8px; border-top: 0.5px solid var(--border); margin-top: 6px; }
  .inv-total-row { display: flex; justify-content: space-between; padding: 2px 0; color: var(--text2); }
  .inv-total-row.grand-row { font-weight: 700; font-size: 14px; color: var(--text); border-top: 0.5px solid var(--border); margin-top: 4px; padding-top: 6px; }
  .inv-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 22px; transition: background 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: #3b6d11; }
  .toggle-track::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle-switch input:checked + .toggle-track::before { transform: translateX(18px); }
  .toggle-lbl { font-size: 12px; color: var(--text2); user-select: none; }
  .expand-btn { font-size: 12px; color: var(--text3); cursor: pointer; white-space: nowrap; user-select: none; padding: 4px; }
  .suggestions { position: absolute; z-index: 30; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 10px; width: 100%; top: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); overflow: hidden; }
  .sug-item { padding: 10px 14px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .sug-item:hover { background: var(--bg2); }
  .sug-due { font-size: 11px; color: var(--danger-text); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); padding: 11px 20px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; z-index: 100; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .search-wrap { margin-bottom: 1rem; }
  .action-bar { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; flex-wrap: wrap; }
  .pos-rel { position: relative; }
  .acct-btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .pay-log { margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .pay-log-title { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .pay-log-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: var(--success-bg); border-radius: 7px; margin-bottom: 5px; }
  .pay-log-row:last-child { margin-bottom: 0; }
  .pay-log-amt { font-size: 13px; font-weight: 600; color: var(--success-text); }
  .pay-log-meta { font-size: 11px; color: var(--success-text); opacity: 0.8; }
  /* ── PDF print styles ── */
  @media print {
    body * { visibility: hidden !important; }
    #pdf-frame, #pdf-frame * { visibility: visible !important; }
    #pdf-frame { position: fixed !important; inset: 0 !important; width: 100% !important; height: auto !important; background: white !important; z-index: 9999 !important; padding: 0 !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Victor Automobiles <span>/ Invoices</span></div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchView('invoice',this)">New Invoice</button>
      <button class="nav-btn" onclick="switchView('accounts',this)">Accounts</button>
    </div>
  </div>
</header>

<div class="container">

  <!-- INVOICE VIEW -->
  <div id="view-invoice" class="view active">
    <p class="section-title">Create Invoice</p>

    <div class="card">
      <p class="card-label">Customer Details</p>
      <div class="grid2">
        <div class="field pos-rel">
          <label>Customer Name *</label>
          <input type="text" id="cust-name" placeholder="Full name" oninput="suggestCustomer()" autocomplete="off"/>
          <div id="name-sug" style="position:absolute;width:100%;top:100%;z-index:30"></div>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="cust-phone" placeholder="+91 XXXXX XXXXX"/>
        </div>
      </div>
      <div class="field">
        <label>Invoice Date</label>
        <input type="date" id="inv-date"/>
      </div>
    </div>

    <div class="card">
      <p class="card-label">Items &amp; Services</p>
      <div class="items-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:44%">Description</th>
              <th style="width:13%">Qty</th>
              <th style="width:22%">Rate (₹)</th>
              <th style="width:17%">Amount</th>
              <th style="width:4%"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
      <button class="btn sm" style="margin-top:10px" onclick="addItem()">+ Add item</button>
    </div>

    <div class="card">
      <p class="card-label">Pricing</p>
      <div class="grid3" style="margin-bottom:14px">
        <div class="field">
          <label>Discount %</label>
          <input type="number" id="discount" value="0" min="0" max="100" oninput="calcTotals()"/>
        </div>
        <div class="field">
          <label>GST %</label>
          <input type="number" id="gst" value="18" min="0" max="100" oninput="calcTotals()"/>
        </div>
        <div class="field">
          <label>Initial Payment (₹)</label>
          <input type="number" id="init-pay" value="0" min="0" placeholder="Paid now"/>
        </div>
      </div>
      <div class="totals-box">
        <div class="total-row"><span>Subtotal</span><span id="t-sub">₹0</span></div>
        <div class="total-row"><span>Discount</span><span id="t-disc">-₹0 (0%)</span></div>
        <div class="total-row"><span>GST</span><span id="t-gst">₹0</span></div>
        <div class="total-row grand"><span>Total</span><span id="t-grand">₹0</span></div>
      </div>
      <div class="field" style="margin-top:12px">
        <label>Notes</label>
        <textarea id="notes" placeholder="Any additional notes..."></textarea>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn" onclick="clearInvoice()">Clear</button>
      <button class="btn pdf-btn" onclick="previewCurrentInvoicePDF()">⬇ Preview &amp; Download PDF</button>
      <button class="btn primary" onclick="saveInvoice()">Save &amp; Add to Account</button>
    </div>
  </div>

  <!-- ACCOUNTS VIEW -->
  <div id="view-accounts" class="view">
    <div class="flex-between" style="margin-bottom:1.25rem">
      <p class="section-title" style="margin:0">Accounts</p>
      <span id="acct-count" style="font-size:13px;color:var(--text2)"></span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search by name or phone..." oninput="renderAccounts()"/>
    </div>
    <div id="accounts-list"></div>
  </div>

</div>

<!-- Hidden PDF frame -->
<div id="pdf-frame" style="display:none;position:fixed;inset:0;background:white;z-index:200;overflow-y:auto;padding:2rem;">
  <div style="max-width:720px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <button onclick="closePDF()" style="padding:8px 18px;border-radius:8px;border:1px solid #ccc;background:white;cursor:pointer;font-size:14px">✕ Close</button>
      <button onclick="window.print()" style="padding:8px 18px;border-radius:8px;border:none;background:#1a1a1a;color:white;cursor:pointer;font-size:14px;font-weight:600">⬇ Download PDF</button>
    </div>
    <div id="pdf-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let accounts = {};
let expanded = {};

function loadData() {
  try { const s = localStorage.getItem('auto_biz_v3'); if (s) accounts = JSON.parse(s); } catch(e) {}
}
function saveData() {
  try { localStorage.setItem('auto_biz_v3', JSON.stringify(accounts)); } catch(e) {}
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d + ' ' + months[+m-1] + ' ' + y;
}
function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if (v === 'accounts') renderAccounts();
}

// ─── Items ───────────────────────────────────────────────
function addItem() {
  items.push({ id: Date.now() + Math.random(), desc: '', qty: 1, rate: 0 });
  renderItems();
}
function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}
function renderItems() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = items.map(item => {
    const amt = (item.qty||0)*(item.rate||0);
    return `<tr>
      <td><input class="td-input" type="text" value="${h(item.desc)}" placeholder="Part / service" onchange="setItemField(${item.id},'desc',this.value)"/></td>
      <td><input class="td-input" type="number" value="${item.qty}" min="0" style="width:56px" oninput="setItemField(${item.id},'qty',this.value)"/></td>
      <td><input class="td-input" type="number" value="${item.rate}" min="0" oninput="setItemField(${item.id},'rate',this.value)"/></td>
      <td class="amt-cell">₹${fmt(amt)}</td>
      <td><button class="btn xs danger" onclick="removeItem(${item.id})">✕</button></td>
    </tr>`;
  }).join('');
  calcTotals();
}
function setItemField(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item[field] = (field==='qty'||field==='rate') ? (parseFloat(value)||0) : value;
  const rows = document.getElementById('items-body').querySelectorAll('tr');
  const idx = items.findIndex(i => i.id === id);
  if (rows[idx]) { const c = rows[idx].querySelector('.amt-cell'); if(c) c.textContent='₹'+fmt(item.qty*item.rate); }
  calcTotals();
}
function calcTotals() {
  const sub = items.reduce((s,i) => s+(i.qty||0)*(i.rate||0), 0);
  const discPct = Math.min(100, Math.max(0, parseFloat(document.getElementById('discount').value)||0));
  const discAmt = sub * discPct / 100;
  const gstPct = Math.max(0, parseFloat(document.getElementById('gst').value)||0);
  const afterDisc = Math.max(0, sub - discAmt);
  const gstAmt = afterDisc * gstPct / 100;
  const grand = afterDisc + gstAmt;
  document.getElementById('t-sub').textContent = '₹'+fmt(sub);
  document.getElementById('t-disc').textContent = '-₹'+fmt(discAmt)+' ('+discPct+'%)';
  document.getElementById('t-gst').textContent = '₹'+fmt(gstAmt)+' ('+gstPct+'%)';
  document.getElementById('t-grand').textContent = '₹'+fmt(grand);
  return { sub, disc:discAmt, discPct, gstPct, gstAmt, grand };
}

// ─── Save Invoice ─────────────────────────────────────────
function saveInvoice() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const dateVal = document.getElementById('inv-date').value || todayStr();
  const initPay = Math.max(0, parseFloat(document.getElementById('init-pay').value)||0);
  if (!name) { showToast('Please enter customer name'); return; }
  if (!items.length) { showToast('Please add at least one item'); return; }
  const t = calcTotals();
  const key = name.toLowerCase().trim();
  if (!accounts[key]) accounts[key] = { name, phone, invoices:[], totalBilled:0, totalPaid:0 };
  if (phone && !accounts[key].phone) accounts[key].phone = phone;
  const invNum = accounts[key].invoices.length + 1;
  const invId = 'INV-' + String(invNum).padStart(3,'0');
  const paid = Math.min(initPay, t.grand);
  accounts[key].invoices.push({
    id:invId, num:invNum, date:dateVal, notes,
    items: JSON.parse(JSON.stringify(items)),
    sub:t.sub, disc:t.disc, discPct:t.discPct, gstPct:t.gstPct, gstAmt:t.gstAmt, grand:t.grand,
    paid: paid >= t.grand, paidAmount: paid
  });
  recomputeTotals(key);
  saveData();
  showToast(invId + ' saved for ' + name);
  clearInvoice();
}
function clearInvoice() {
  ['cust-name','cust-phone','notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('inv-date').value = todayStr();
  document.getElementById('discount').value = '0';
  document.getElementById('gst').value = '18';
  document.getElementById('init-pay').value = '0';
  document.getElementById('name-sug').innerHTML = '';
  items = [];
  renderItems();
}

// ─── Autocomplete ─────────────────────────────────────────
function suggestCustomer() {
  const val = document.getElementById('cust-name').value.toLowerCase();
  const div = document.getElementById('name-sug');
  if (val.length < 2) { div.innerHTML=''; return; }
  const matches = Object.values(accounts).filter(a => a.name.toLowerCase().includes(val)).slice(0,5);
  if (!matches.length) { div.innerHTML=''; return; }
  div.innerHTML = `<div class="suggestions">${matches.map(m=>`
    <div class="sug-item" onclick="fillCustomer('${h(m.name)}','${h(m.phone||'')}')">
      <span>${h(m.name)} <span style="color:var(--text2);font-size:12px">${m.phone||''}</span></span>
      <span class="sug-due">Due ₹${fmt(Math.max(0,m.totalBilled-m.totalPaid))}</span>
    </div>`).join('')}</div>`;
}
function fillCustomer(name, phone) {
  document.getElementById('cust-name').value = name;
  document.getElementById('cust-phone').value = phone;
  document.getElementById('name-sug').innerHTML = '';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#cust-name') && !e.target.closest('#name-sug'))
    document.getElementById('name-sug').innerHTML = '';
});

// ─── Accounts ────────────────────────────────────────────
function recomputeTotals(key) {
  accounts[key].totalBilled = accounts[key].invoices.reduce((s,inv) => s+inv.grand, 0);
  accounts[key].totalPaid   = accounts[key].invoices.reduce((s,inv) => s+(inv.paidAmount||0), 0);
}
function toggleInvoicePaid(key, idx) {
  const inv = accounts[key].invoices[idx];
  inv.paid = !inv.paid;
  inv.paidAmount = inv.paid ? inv.grand : 0;
  recomputeTotals(key);
  saveData();
  renderAccounts();
}
function renderAccounts() {
  const search = (document.getElementById('search')?.value||'').toLowerCase();
  const list = document.getElementById('accounts-list');
  const keys = Object.keys(accounts).filter(k => {
    const a = accounts[k];
    return !search || a.name.toLowerCase().includes(search) || (a.phone&&a.phone.includes(search));
  });
  document.getElementById('acct-count').textContent = keys.length+' customer'+(keys.length!==1?'s':'');
  if (!keys.length) { list.innerHTML=`<div class="empty">No accounts yet.<br>Save an invoice to create an account.</div>`; return; }

  list.innerHTML = keys.sort((a,b) => {
    const da = accounts[a].totalBilled-accounts[a].totalPaid;
    const db = accounts[b].totalBilled-accounts[b].totalPaid;
    return db-da;
  }).map(k => {
    const a = accounts[k];
    const due = Math.max(0, a.totalBilled - a.totalPaid);
    const st = due<=0?'success':a.totalPaid>0?'warning':'danger';
    const stLbl = due<=0?'Paid':a.totalPaid>0?'Partial':'Unpaid';
    const isOpen = expanded[k];

    const invoiceBlocks = a.invoices.map((inv, i) => `
      <div class="inv-block">
        <div class="inv-block-header">
          <div>
            <span class="inv-num">${inv.id}</span>
            <span class="inv-date-txt"> — ${formatDate(inv.date)}</span>
          </div>
          <span class="inv-status-badge ${inv.paid?'badge-success':'badge-danger'}">${inv.paid?'Paid':'Unpaid'}</span>
        </div>
        <table class="inv-items-table">
          <thead><tr>
            <th style="width:50%">Description</th>
            <th style="width:12%">Qty</th>
            <th style="width:20%">Rate</th>
            <th style="width:18%" class="td-right">Amount</th>
          </tr></thead>
          <tbody>
            ${inv.items.map(it=>`<tr>
              <td>${h(it.desc||'—')}</td>
              <td>${it.qty}</td>
              <td>₹${fmt(it.rate)}</td>
              <td class="td-right">₹${fmt(it.qty*it.rate)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="inv-totals">
          <div class="inv-total-row"><span>Subtotal</span><span>₹${fmt(inv.sub)}</span></div>
          ${inv.disc>0?`<div class="inv-total-row"><span>Discount${inv.discPct?` (${inv.discPct}%)`:''}  </span><span>-₹${fmt(inv.disc)}</span></div>`:''}
          ${inv.gstAmt>0?`<div class="inv-total-row"><span>GST (${inv.gstPct}%)</span><span>₹${fmt(inv.gstAmt)}</span></div>`:''}
          <div class="inv-total-row grand-row"><span>Total</span><span>₹${fmt(inv.grand)}</span></div>
        </div>
        ${inv.notes?`<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">${h(inv.notes)}</div>`:''}
        <div class="inv-actions">
          <div class="toggle-wrap" onclick="toggleInvoicePaid('${k}',${i})" style="cursor:pointer">
            <div class="toggle-switch" style="pointer-events:none">
              <input type="checkbox" ${inv.paid?'checked':''} style="pointer-events:none"/>
              <div class="toggle-track"></div>
            </div>
            <span class="toggle-lbl">${inv.paid?'Mark as unpaid':'Mark as paid'}</span>
          </div>
          <button class="btn pdf-btn" onclick="downloadSingleInvoicePDF('${k}',${i})">⬇ PDF</button>
          <button class="btn xs danger" style="margin-left:auto" onclick="deleteInvoice('${k}',${i})">Remove</button>
        </div>
      </div>`).join('');

    return `<div class="acct-card">
      <div class="acct-header">
        <div>
          <div class="acct-name">${h(a.name)}</div>
          <div class="acct-phone">${a.phone||'No phone'} &nbsp;<span class="badge badge-${st}">${stLbl}</span></div>
        </div>
        <span class="expand-btn" onclick="toggleCard('${k}')">${isOpen?'▲ Less':'▼ Details'}</span>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-lbl">Total Billed</div><div class="stat-val">₹${fmt(a.totalBilled)}</div></div>
        <div class="stat"><div class="stat-lbl">Paid</div><div class="stat-val success">₹${fmt(a.totalPaid)}</div></div>
        <div class="stat"><div class="stat-lbl">Balance Due</div><div class="stat-val ${due>0?'danger':'success'}">₹${fmt(due)}</div></div>
      </div>
      <div class="acct-btn-row">
        <input type="number" id="pay-${k}" placeholder="Enter amount paid ₹" min="0" style="flex:1;min-width:130px;max-width:200px"/>
        <button class="btn sm primary" onclick="addPayment('${k}')">Record Payment</button>
        <button class="btn pdf-btn" onclick="downloadAccountStatementPDF('${k}')">⬇ Statement PDF</button>
        <button class="btn sm danger" onclick="deleteAccount('${k}')">Delete</button>
      </div>
      <div class="inv-detail ${isOpen?'open':''}" id="detail-${k}">
        <p style="font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text3);text-transform:uppercase;margin-bottom:10px">
          Invoices (${a.invoices.length})
        </p>
        ${invoiceBlocks||'<div style="color:var(--text3);font-size:13px">No invoices</div>'}
        ${a.paymentLog&&a.paymentLog.length?`<div class="pay-log">
          <div class="pay-log-title">Payment History (${a.paymentLog.length})</div>
          ${a.paymentLog.slice().reverse().map(p=>`<div class="pay-log-row">
            <span class="pay-log-amt">₹${fmt(p.amount)}</span>
            <span class="pay-log-meta">${p.date} &nbsp;·&nbsp; ${p.time}</span>
          </div>`).join('')}
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(k) {
  expanded[k] = !expanded[k];
  renderAccounts();
}

function addPayment(k) {
  const input = document.getElementById('pay-'+k);
  const amt = parseFloat(input.value)||0;
  if (amt<=0) { showToast('Enter a valid amount'); return; }
  const due = accounts[k].totalBilled - accounts[k].totalPaid;
  if (amt>due+0.01) { showToast('Amount exceeds balance due of ₹'+fmt(due)); return; }
  let remaining = amt;
  for (let inv of accounts[k].invoices) {
    if (remaining<=0) break;
    const invDue = inv.grand-(inv.paidAmount||0);
    if (invDue<=0) continue;
    const pay = Math.min(remaining, invDue);
    inv.paidAmount = (inv.paidAmount||0)+pay;
    if (inv.paidAmount>=inv.grand-0.01) { inv.paid=true; inv.paidAmount=inv.grand; }
    remaining -= pay;
  }
  if (!accounts[k].paymentLog) accounts[k].paymentLog = [];
  const now = new Date();
  accounts[k].paymentLog.push({
    amount: amt,
    date: now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}),
    time: now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true})
  });
  recomputeTotals(k);
  saveData();
  showToast('₹'+fmt(amt)+' recorded for '+accounts[k].name);
  renderAccounts();
}
function deleteInvoice(k, idx) {
  if (!confirm('Remove this invoice?')) return;
  accounts[k].invoices.splice(idx,1);
  accounts[k].invoices.forEach((inv,i) => { inv.num=i+1; inv.id='INV-'+String(i+1).padStart(3,'0'); });
  recomputeTotals(k);
  if (!accounts[k].invoices.length) delete accounts[k];
  saveData();
  renderAccounts();
}
function deleteAccount(k) {
  if (!confirm('Delete entire account for '+accounts[k].name+'?')) return;
  delete accounts[k];
  saveData();
  renderAccounts();
}

// ─── PDF generation ───────────────────────────────────────

  return `
    <style>

      body { font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; font-size: 13px; line-height: 1.5; }
      .pdf-page { max-width: 720px; margin: 0 auto; padding: 40px; background: white; }

      .biz-name { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: #1a1a1a; margin-bottom: 4px; }
      .biz-sub { font-size: 12px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
      .inv-meta { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
      .inv-meta-block { flex: 1; }
      .meta-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; margin-bottom: 4px; }
      .meta-value { font-size: 14px; font-weight: 600; color: #1a1a1a; }
      .meta-sub { font-size: 12px; color: #555; }

      .status-paid { background: #eaf3de; color: #3b6d11; }
      .status-unpaid { background: #fcebeb; color: #a32d2d; }
      .items-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
      .items-table th { background: #f5f5f3; padding: 9px 10px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #555; border-bottom: 1px solid #ddd; }
      .items-table td { padding: 9px 10px; border-bottom: 1px solid #eee; font-size: 13px; }
      .items-table tr:last-child td { border-bottom: none; }
      .items-table .right { text-align: right; }
      .items-table .bold { font-weight: 600; }
      .totals-section { margin-left: auto; width: 260px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
      .total-line { display: flex; justify-content: space-between; padding: 7px 12px; font-size: 13px; border-bottom: 1px solid #eee; color: #555; }
      .total-line:last-child { border-bottom: none; }
      .total-line.grand { background: #1a1a1a; color: white; font-weight: 700; font-size: 15px; }
      .notes-box { margin-top: 20px; padding: 12px 14px; background: #f9f9f7; border-radius: 8px; border-left: 3px solid #ccc; font-size: 12px; color: #555; }
      .notes-label { font-weight: 700; color: #333; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
      .footer { margin-top: 36px; text-align: center; font-size: 11px; color: #aaa; border-top: 1px solid #eee; padding-top: 16px; }
      .page-break { page-break-after: always; }
    </style>`;
}

function buildInvoiceHTML(inv, custName, custPhone) {
  const itemRows = inv.items.map(it => `
    <tr>
      <td>${escHTML(it.desc||'—')}</td>
      <td class="right">${it.qty}</td>
      <td class="right">₹${fmt(it.rate)}</td>
      <td class="right bold">₹${fmt(it.qty*it.rate)}</td>
    </tr>`).join('');

  return `
    <div class="inv-meta">
      <div class="inv-meta-block">
        <div class="meta-label">Bill To</div>
        <div class="meta-value">${escHTML(custName)}</div>
        ${custPhone?`<div class="meta-sub">${escHTML(custPhone)}</div>`:''}
      </div>
      <div class="inv-meta-block" style="text-align:right">
        <div class="meta-label">Invoice</div>
        <div class="meta-value">${inv.id}</div>
        <div class="meta-sub">Date: ${formatDate(inv.date)}</div>
        <div style="margin-top:6px"><span class="status-badge ${inv.paid?'status-paid':'status-unpaid'}">${inv.paid?'PAID':'UNPAID'}</span></div>
      </div>
    </div>
    <table class="items-table">
      <thead><tr>
        <th style="width:48%">Description</th>
        <th style="width:13%;text-align:right">Qty</th>
        <th style="width:19%;text-align:right">Rate</th>
        <th style="width:20%;text-align:right">Amount</th>
      </tr></thead>
      <tbody>${itemRows}</tbody>
    </table>
    <div style="display:flex;justify-content:flex-end">
      <div class="totals-section">
        <div class="total-line"><span>Subtotal</span><span>₹${fmt(inv.sub)}</span></div>
        ${inv.disc>0?`<div class="total-line"><span>Discount${inv.discPct?` (${inv.discPct}%)`:''}  </span><span>-₹${fmt(inv.disc)}</span></div>`:''}
        ${inv.gstAmt>0?`<div class="total-line"><span>GST (${inv.gstPct}%)</span><span>₹${fmt(inv.gstAmt)}</span></div>`:''}
        <div class="total-line grand"><span>Total</span><span>₹${fmt(inv.grand)}</span></div>
      </div>
    </div>
    ${inv.notes?`<div class="notes-box"><div class="notes-label">Notes</div>${escHTML(inv.notes)}</div>`:''}`;
}

function showPDF(html) {
  document.getElementById('pdf-content').innerHTML = html;
  document.getElementById('pdf-frame').style.display = 'block';
  document.getElementById('pdf-frame').scrollTop = 0;
}
function closePDF() {
  document.getElementById('pdf-frame').style.display = 'none';
}

// Preview current unsaved invoice as PDF
function previewCurrentInvoicePDF() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  if (!name) { showToast('Enter customer name first'); return; }
  if (!items.length) { showToast('Add at least one item'); return; }
  const t = calcTotals();
  const dateVal = document.getElementById('inv-date').value || todayStr();
  const notes = document.getElementById('notes').value.trim();
  const inv = {
    id: 'PREVIEW', date: dateVal, notes,
    items: JSON.parse(JSON.stringify(items)),
    sub: t.sub, disc: t.disc, discPct: t.discPct, gstPct: t.gstPct, gstAmt: t.gstAmt, grand: t.grand,
    paid: false, paidAmount: 0
  };
  const html = `${pdfStyles()}
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="biz-name">Victor Automobiles</div>
        <div class="biz-sub">Invoice</div>
      </div>
      ${buildInvoiceHTML(inv, name, phone)}
    </div>`;
  showPDF(html);
}

// Download single saved invoice as PDF
function downloadSingleInvoicePDF(k, idx) {
  const a = accounts[k];
  const inv = a.invoices[idx];
  const html = `${pdfStyles()}
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="biz-name">Victor Automobiles</div>
        <div class="biz-sub">Invoice</div>
      </div>
      ${buildInvoiceHTML(inv, a.name, a.phone)}
    </div>`;
  showPDF(html);
}

// Download account statement PDF (summary only)
function downloadAccountStatementPDF(k) {
  const a = accounts[k];
  const due = Math.max(0, a.totalBilled - a.totalPaid);

  const summaryRows = a.invoices.map(inv => `
    <tr>
      <td>${inv.id}</td>
      <td>${formatDate(inv.date)}</td>
      <td style="text-align:right">₹${fmt(inv.grand)}</td>
      <td style="text-align:right">₹${fmt(inv.paidAmount||0)}</td>
      <td style="text-align:center"><span class="status-badge ${inv.paid?'status-paid':'status-unpaid'}">${inv.paid?'Paid':'Unpaid'}</span></td>
    </tr>`).join('');

  const html = `${pdfStyles()}
    <style>
      .summary-table { width:100%;border-collapse:collapse;font-size:13px; }
      .summary-table th { background:#f5f5f3;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#555;border-bottom:1px solid #ddd; }
      .summary-table td { padding:9px 10px;border-bottom:1px solid #eee; }
      .summary-table tr:last-child td { border-bottom:none; }
      .summary-box { background:#f9f9f7;border-radius:8px;padding:16px 20px;margin-top:16px; }
    </style>
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="biz-name">Victor Automobiles</div>
        <div class="biz-sub">Account Statement</div>
      </div>
      <div class="inv-meta">
        <div class="inv-meta-block">
          <div class="meta-label">Customer</div>
          <div class="meta-value">${escHTML(a.name)}</div>
          ${a.phone?`<div class="meta-sub">${escHTML(a.phone)}</div>`:''}
        </div>
        <div class="inv-meta-block" style="text-align:right">
          <div class="meta-label">Statement Date</div>
          <div class="meta-value">${formatDate(todayStr())}</div>
          <div style="margin-top:6px"><span class="status-badge ${due<=0?'status-paid':'status-unpaid'}">${due<=0?'FULLY PAID':'BALANCE DUE'}</span></div>
        </div>
      </div>
      <table class="summary-table">
        <thead><tr>
          <th>Invoice</th><th>Date</th>
          <th style="text-align:right">Amount</th>
          <th style="text-align:right">Paid</th>
          <th style="text-align:center">Status</th>
        </tr></thead>
        <tbody>${summaryRows}</tbody>
      </table>
      <div class="summary-box">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#555"><span>Total Billed</span><span>₹${fmt(a.totalBilled)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#3b6d11"><span>Total Paid</span><span>₹${fmt(a.totalPaid)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:${due>0?'#a32d2d':'#3b6d11'};border-top:1px solid #ddd;padding-top:8px;margin-top:4px">
          <span>Balance Due</span><span>₹${fmt(due)}</span>
        </div>
      </div>
    </div>`;
  showPDF(html);
}

function fmt(n) { return Math.round(n).toLocaleString('en-IN'); }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escHTML(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
document.getElementById('inv-date').value = todayStr();
addItem();
</script>
