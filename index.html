<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auto Biz — Invoice Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #666660; --text3: #999993;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de; --success-text: #3b6d11;
    --warning-bg: #faeeda; --warning-text: #854f0b;
    --danger-bg: #fcebeb; --danger-text: #a32d2d;
    --radius: 10px; --radius-lg: 14px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #282825; --bg3: #323230;
      --text: #f0efeb; --text2: #a8a89f; --text3: #6e6e68;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success-bg: #173404; --success-text: #c0dd97;
      --warning-bg: #412402; --warning-text: #fac775;
      --danger-bg: #501313; --danger-text: #f09595;
    }
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1rem; position: sticky; top: 0; z-index: 50; }
  .header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--text2); font-weight: 400; }
  .nav { display: flex; gap: 4px; }
  .nav-btn { padding: 7px 16px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: var(--text2); font-family: var(--font); transition: all 0.15s; }
  .nav-btn.active { background: var(--text); color: var(--bg); }
  .nav-btn:hover:not(.active) { background: var(--bg2); color: var(--text); }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .view { display: none; }
  .view.active { display: block; }
  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; letter-spacing: -0.3px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.6px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .grid3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 360px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
  input, select, textarea {
    width: 100%; font-family: var(--font); font-size: 15px;
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    outline: none; transition: border 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--border2); background: var(--bg); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button { display: none; }
  input[type=date] { cursor: pointer; }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  .items-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 400px; }
  th { text-align: left; padding: 6px 8px; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text3); border-bottom: 0.5px solid var(--border); }
  td { padding: 5px 4px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .td-input { background: transparent; border: none; border-radius: 6px; padding: 6px 8px; font-size: 14px; color: var(--text); font-family: var(--font); width: 100%; }
  .td-input:focus { background: var(--bg2); outline: none; }
  .td-input[type=number] { -moz-appearance: textfield; }
  .td-input[type=number]::-webkit-inner-spin-button { display: none; }
  .amt-cell { font-size: 14px; font-weight: 500; padding-left: 8px; white-space: nowrap; }
  .btn { padding: 9px 18px; border-radius: 8px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; font-size: 14px; font-family: var(--font); color: var(--text); transition: all 0.15s; font-weight: 500; }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: var(--danger-text); border-color: transparent; background: var(--danger-bg); }
  .btn.danger:hover { opacity: 0.8; }
  .btn.sm { padding: 5px 11px; font-size: 12px; }
  .btn.xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }
  .totals-box { background: var(--bg2); border-radius: 10px; padding: 14px; }
  .total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: var(--text2); }
  .total-row.grand { font-size: 18px; font-weight: 600; color: var(--text); border-top: 0.5px solid var(--border); margin-top: 6px; padding-top: 10px; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-success { background: var(--success-bg); color: var(--success-text); }
  .badge-warning { background: var(--warning-bg); color: var(--warning-text); }
  .badge-danger { background: var(--danger-bg); color: var(--danger-text); }
  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 12px; }
  .acct-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .acct-name { font-size: 16px; font-weight: 600; }
  .acct-phone { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: 8px; padding: 10px 12px; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .stat-val { font-size: 17px; font-weight: 600; }
  .stat-val.danger { color: var(--danger-text); }
  .stat-val.success { color: var(--success-text); }
  .pay-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pay-row input { flex: 1; min-width: 120px; max-width: 180px; }
  .inv-detail { display: none; border-top: 0.5px solid var(--border); margin-top: 14px; padding-top: 12px; }
  .inv-detail.open { display: block; }
  .inv-row { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .inv-row:last-child { border-bottom: none; padding-bottom: 0; }
  .inv-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .inv-row-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .inv-num { font-weight: 700; font-size: 13px; }
  .inv-date-txt { font-size: 12px; color: var(--text2); }
  .inv-amount { font-weight: 600; font-size: 15px; white-space: nowrap; }
  .tag { display: inline-block; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 11px; color: var(--text2); margin: 2px 2px 0 0; }
  .expand-btn { font-size: 12px; color: var(--text3); cursor: pointer; white-space: nowrap; user-select: none; padding: 4px; }
  .suggestions { position: absolute; z-index: 30; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 10px; width: 100%; top: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); overflow: hidden; }
  .sug-item { padding: 10px 14px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .sug-item:hover { background: var(--bg2); }
  .sug-due { font-size: 11px; color: var(--danger-text); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); padding: 11px 20px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; z-index: 100; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .search-wrap { margin-bottom: 1rem; }
  .action-bar { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; }
  .pos-rel { position: relative; }
  /* Toggle switch */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 22px; transition: background 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: #3b6d11; }
  .toggle-track::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle-switch input:checked + .toggle-track::before { transform: translateX(18px); }
  .toggle-lbl { font-size: 12px; color: var(--text2); user-select: none; }
  .inv-status-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-left: auto; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Auto Biz <span>/ Invoices</span></div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchView('invoice',this)">New Invoice</button>
      <button class="nav-btn" onclick="switchView('accounts',this)">Accounts</button>
    </div>
  </div>
</header>

<div class="container">

  <!-- INVOICE VIEW -->
  <div id="view-invoice" class="view active">
    <p class="section-title">Create Invoice</p>

    <div class="card">
      <p class="card-label">Customer Details</p>
      <div class="grid2">
        <div class="field pos-rel">
          <label>Customer Name *</label>
          <input type="text" id="cust-name" placeholder="Full name" oninput="suggestCustomer()" autocomplete="off"/>
          <div id="name-sug" style="position:absolute;width:100%;top:100%;z-index:30"></div>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="cust-phone" placeholder="+91 XXXXX XXXXX"/>
        </div>
      </div>
      <div class="field">
        <label>Invoice Date</label>
        <input type="date" id="inv-date"/>
      </div>
    </div>

    <div class="card">
      <p class="card-label">Items &amp; Services</p>
      <div class="items-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:44%">Description</th>
              <th style="width:13%">Qty</th>
              <th style="width:22%">Rate (₹)</th>
              <th style="width:17%">Amount</th>
              <th style="width:4%"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
      <button class="btn sm" style="margin-top:10px" onclick="addItem()">+ Add item</button>
    </div>

    <div class="card">
      <p class="card-label">Pricing</p>
      <div class="grid3" style="margin-bottom:14px">
        <div class="field">
          <label>Discount (₹)</label>
          <input type="number" id="discount" value="0" min="0" oninput="calcTotals()"/>
        </div>
        <div class="field">
          <label>GST %</label>
          <input type="number" id="gst" value="18" min="0" max="100" oninput="calcTotals()"/>
        </div>
        <div class="field">
          <label>Initial Payment (₹)</label>
          <input type="number" id="init-pay" value="0" min="0" placeholder="Paid now"/>
        </div>
      </div>
      <div class="totals-box">
        <div class="total-row"><span>Subtotal</span><span id="t-sub">₹0</span></div>
        <div class="total-row"><span>Discount</span><span id="t-disc">-₹0</span></div>
        <div class="total-row"><span>GST</span><span id="t-gst">₹0</span></div>
        <div class="total-row grand"><span>Total</span><span id="t-grand">₹0</span></div>
      </div>
      <div class="field" style="margin-top:12px">
        <label>Notes</label>
        <textarea id="notes" placeholder="Any additional notes..."></textarea>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn" onclick="clearInvoice()">Clear</button>
      <button class="btn primary" onclick="saveInvoice()">Save &amp; Add to Account</button>
    </div>
  </div>

  <!-- ACCOUNTS VIEW -->
  <div id="view-accounts" class="view">
    <div class="flex-between" style="margin-bottom:1.25rem">
      <p class="section-title" style="margin:0">Accounts</p>
      <span id="acct-count" style="font-size:13px;color:var(--text2)"></span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search by name or phone..." oninput="renderAccounts()"/>
    </div>
    <div id="accounts-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let accounts = {};
let expanded = {};

function loadData() {
  try { const s = localStorage.getItem('auto_biz_v3'); if (s) accounts = JSON.parse(s); } catch(e) {}
}
function saveData() {
  try { localStorage.setItem('auto_biz_v3', JSON.stringify(accounts)); } catch(e) {}
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d + ' ' + months[+m-1] + ' ' + y;
}

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if (v === 'accounts') renderAccounts();
}

// ─── Items ───────────────────────────────────────────────
function addItem() {
  items.push({ id: Date.now() + Math.random(), desc: '', qty: 1, rate: 0 });
  renderItems();
}
function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}
function renderItems() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = items.map(item => {
    const amt = (item.qty || 0) * (item.rate || 0);
    return `<tr>
      <td><input class="td-input" type="text" value="${h(item.desc)}" placeholder="Part / service"
        onchange="setItemField(${item.id},'desc',this.value)"/></td>
      <td><input class="td-input" type="number" value="${item.qty}" min="0" style="width:56px"
        oninput="setItemField(${item.id},'qty',this.value)"/></td>
      <td><input class="td-input" type="number" value="${item.rate}" min="0"
        oninput="setItemField(${item.id},'rate',this.value)"/></td>
      <td class="amt-cell">₹${fmt(amt)}</td>
      <td><button class="btn xs danger" onclick="removeItem(${item.id})">✕</button></td>
    </tr>`;
  }).join('');
  calcTotals();
}
function setItemField(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item[field] = (field === 'qty' || field === 'rate') ? (parseFloat(value) || 0) : value;
  // Update only the amount cell for that row without full re-render to avoid losing focus
  const rows = document.getElementById('items-body').querySelectorAll('tr');
  const idx = items.findIndex(i => i.id === id);
  if (rows[idx]) {
    const amtCell = rows[idx].querySelector('.amt-cell');
    if (amtCell) amtCell.textContent = '₹' + fmt(item.qty * item.rate);
  }
  calcTotals();
}

function calcTotals() {
  const sub = items.reduce((s, i) => s + (i.qty || 0) * (i.rate || 0), 0);
  const disc = Math.max(0, parseFloat(document.getElementById('discount').value) || 0);
  const gstPct = Math.max(0, parseFloat(document.getElementById('gst').value) || 0);
  const afterDisc = Math.max(0, sub - disc);
  const gstAmt = afterDisc * gstPct / 100;
  const grand = afterDisc + gstAmt;
  document.getElementById('t-sub').textContent = '₹' + fmt(sub);
  document.getElementById('t-disc').textContent = '-₹' + fmt(disc);
  document.getElementById('t-gst').textContent = '₹' + fmt(gstAmt) + ' (' + gstPct + '%)';
  document.getElementById('t-grand').textContent = '₹' + fmt(grand);
  return { sub, disc, gstPct, gstAmt, grand };
}

// ─── Save Invoice ─────────────────────────────────────────
function saveInvoice() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const dateVal = document.getElementById('inv-date').value || todayStr();
  const initPay = Math.max(0, parseFloat(document.getElementById('init-pay').value) || 0);

  if (!name) { showToast('Please enter customer name'); return; }
  if (!items.length) { showToast('Please add at least one item'); return; }

  const t = calcTotals();
  const key = name.toLowerCase().trim();

  if (!accounts[key]) accounts[key] = { name, phone, invoices: [], totalBilled: 0, totalPaid: 0 };
  if (phone && !accounts[key].phone) accounts[key].phone = phone;

  const invNum = accounts[key].invoices.length + 1;
  const invId = 'INV-' + String(invNum).padStart(3, '0');
  const paid = Math.min(initPay, t.grand);

  accounts[key].invoices.push({
    id: invId, num: invNum, date: dateVal, notes,
    items: JSON.parse(JSON.stringify(items)),
    sub: t.sub, disc: t.disc, gstPct: t.gstPct, gstAmt: t.gstAmt, grand: t.grand,
    paid: paid >= t.grand, paidAmount: paid
  });

  recomputeTotals(key);
  saveData();
  showToast(invId + ' saved for ' + name);
  clearInvoice();
}

function clearInvoice() {
  ['cust-name','cust-phone','notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inv-date').value = todayStr();
  document.getElementById('discount').value = '0';
  document.getElementById('gst').value = '18';
  document.getElementById('init-pay').value = '0';
  document.getElementById('name-sug').innerHTML = '';
  items = [];
  renderItems();
}

// ─── Autocomplete ─────────────────────────────────────────
function suggestCustomer() {
  const val = document.getElementById('cust-name').value.toLowerCase();
  const div = document.getElementById('name-sug');
  if (val.length < 2) { div.innerHTML = ''; return; }
  const matches = Object.values(accounts).filter(a => a.name.toLowerCase().includes(val)).slice(0, 5);
  if (!matches.length) { div.innerHTML = ''; return; }
  div.innerHTML = `<div class="suggestions">${matches.map(m => `
    <div class="sug-item" onclick="fillCustomer('${h(m.name)}','${h(m.phone||'')}')">
      <span>${h(m.name)} <span style="color:var(--text2);font-size:12px">${m.phone||''}</span></span>
      <span class="sug-due">Due ₹${fmt(Math.max(0, m.totalBilled - m.totalPaid))}</span>
    </div>`).join('')}</div>`;
}
function fillCustomer(name, phone) {
  document.getElementById('cust-name').value = name;
  document.getElementById('cust-phone').value = phone;
  document.getElementById('name-sug').innerHTML = '';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#cust-name') && !e.target.closest('#name-sug'))
    document.getElementById('name-sug').innerHTML = '';
});

// ─── Accounts ────────────────────────────────────────────
function recomputeTotals(key) {
  accounts[key].totalBilled = accounts[key].invoices.reduce((s, inv) => s + inv.grand, 0);
  accounts[key].totalPaid = accounts[key].invoices.reduce((s, inv) => s + (inv.paidAmount || 0), 0);
}

function toggleInvoicePaid(key, idx) {
  const inv = accounts[key].invoices[idx];
  inv.paid = !inv.paid;
  inv.paidAmount = inv.paid ? inv.grand : 0;
  recomputeTotals(key);
  saveData();
  renderAccounts();
}

function renderAccounts() {
  const search = (document.getElementById('search')?.value || '').toLowerCase();
  const list = document.getElementById('accounts-list');
  const keys = Object.keys(accounts).filter(k => {
    const a = accounts[k];
    return !search || a.name.toLowerCase().includes(search) || (a.phone && a.phone.includes(search));
  });

  document.getElementById('acct-count').textContent = keys.length + ' customer' + (keys.length !== 1 ? 's' : '');

  if (!keys.length) {
    list.innerHTML = `<div class="empty">No accounts yet.<br>Save an invoice to create an account.</div>`;
    return;
  }

  list.innerHTML = keys.sort((a, b) => {
    const da = accounts[a].totalBilled - accounts[a].totalPaid;
    const db = accounts[b].totalBilled - accounts[b].totalPaid;
    return db - da;
  }).map(k => {
    const a = accounts[k];
    const due = Math.max(0, a.totalBilled - a.totalPaid);
    const st = due <= 0 ? 'success' : a.totalPaid > 0 ? 'warning' : 'danger';
    const stLbl = due <= 0 ? 'Paid' : a.totalPaid > 0 ? 'Partial' : 'Unpaid';
    const isOpen = expanded[k];

    const invoiceRows = a.invoices.map((inv, i) => `
      <div class="inv-row">
        <div class="inv-row-top">
          <div>
            <span class="inv-num">${inv.id}</span>
            <span class="inv-date-txt"> — ${formatDate(inv.date)}</span>
            <br/>
            <span style="font-size:13px;font-weight:500;color:var(--text)">₹${fmt(inv.grand)}</span>
          </div>
          <span class="inv-status-badge ${inv.paid ? 'badge-success' : 'badge-danger'}">
            ${inv.paid ? 'Paid' : 'Unpaid'}
          </span>
        </div>
        ${inv.items.length ? `<div style="margin-bottom:8px">
          ${inv.items.slice(0,3).map(it => `<span class="tag">${h(it.desc)}</span>`).join('')}
          ${inv.items.length > 3 ? `<span class="tag">+${inv.items.length-3} more</span>` : ''}
        </div>` : ''}
        <div class="inv-row-bottom">
          <label class="toggle-wrap" onclick="toggleInvoicePaid('${k}',${i})">
            <div class="toggle-switch">
              <input type="checkbox" ${inv.paid ? 'checked' : ''} onclick="event.stopPropagation();toggleInvoicePaid('${k}',${i})"/>
              <div class="toggle-track"></div>
            </div>
            <span class="toggle-lbl">${inv.paid ? 'Mark as unpaid' : 'Mark as paid'}</span>
          </label>
          <button class="btn xs danger" style="margin-left:auto" onclick="deleteInvoice('${k}',${i})">Remove</button>
        </div>
        ${inv.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:6px">${h(inv.notes)}</div>` : ''}
      </div>`).join('');

    return `<div class="acct-card">
      <div class="acct-header">
        <div>
          <div class="acct-name">${h(a.name)}</div>
          <div class="acct-phone">${a.phone || 'No phone'} &nbsp;<span class="badge badge-${st}">${stLbl}</span></div>
        </div>
        <span class="expand-btn" onclick="toggleCard('${k}')">${isOpen ? '▲ Less' : '▼ Details'}</span>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-lbl">Total Billed</div><div class="stat-val">₹${fmt(a.totalBilled)}</div></div>
        <div class="stat"><div class="stat-lbl">Paid</div><div class="stat-val success">₹${fmt(a.totalPaid)}</div></div>
        <div class="stat"><div class="stat-lbl">Balance Due</div><div class="stat-val ${due > 0 ? 'danger' : 'success'}">₹${fmt(due)}</div></div>
      </div>
      <div class="pay-row">
        <input type="number" id="pay-${k}" placeholder="Enter amount paid ₹" min="0"/>
        <button class="btn sm primary" onclick="addPayment('${k}')">Record Payment</button>
        <button class="btn sm danger" onclick="deleteAccount('${k}')">Delete</button>
      </div>
      <div class="inv-detail ${isOpen ? 'open' : ''}" id="detail-${k}">
        <p style="font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text3);text-transform:uppercase;margin-bottom:10px">
          Invoices (${a.invoices.length})
        </p>
        ${invoiceRows || '<div style="color:var(--text3);font-size:13px">No invoices</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(k) {
  expanded[k] = !expanded[k];
  renderAccounts();
}

function addPayment(k) {
  const input = document.getElementById('pay-' + k);
  const amt = parseFloat(input.value) || 0;
  if (amt <= 0) { showToast('Enter a valid amount'); return; }
  const due = accounts[k].totalBilled - accounts[k].totalPaid;
  if (amt > due + 0.01) { showToast('Amount exceeds balance due of ₹' + fmt(due)); return; }
  // Distribute across unpaid invoices in order
  let remaining = amt;
  for (let inv of accounts[k].invoices) {
    if (remaining <= 0) break;
    const invDue = inv.grand - (inv.paidAmount || 0);
    if (invDue <= 0) continue;
    const pay = Math.min(remaining, invDue);
    inv.paidAmount = (inv.paidAmount || 0) + pay;
    if (inv.paidAmount >= inv.grand - 0.01) { inv.paid = true; inv.paidAmount = inv.grand; }
    remaining -= pay;
  }
  recomputeTotals(k);
  saveData();
  showToast('₹' + fmt(amt) + ' recorded for ' + accounts[k].name);
  renderAccounts();
}

function deleteInvoice(k, idx) {
  if (!confirm('Remove this invoice?')) return;
  accounts[k].invoices.splice(idx, 1);
  accounts[k].invoices.forEach((inv, i) => {
    inv.num = i + 1;
    inv.id = 'INV-' + String(i+1).padStart(3,'0');
  });
  recomputeTotals(k);
  if (!accounts[k].invoices.length) delete accounts[k];
  saveData();
  renderAccounts();
}

function deleteAccount(k) {
  if (!confirm('Delete entire account for ' + accounts[k].name + '?')) return;
  delete accounts[k];
  saveData();
  renderAccounts();
}

function fmt(n) { return Math.round(n).toLocaleString('en-IN'); }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

loadData();
document.getElementById('inv-date').value = todayStr();
addItem();
</script>
</body>
</html>
